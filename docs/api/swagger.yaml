info:
  contact: {}
paths:
  /articles:
    get:
      description: Returns a paginated, filtered list of articles
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: page_size
        type: integer
      - description: Filter by status
        enum:
        - draft
        - published
        - pending
        - scheduled
        - trash
        - archived
        in: query
        name: status
        type: string
      - description: Post type
        enum:
        - post
        - page
        in: query
        name: post_type
        type: string
      - description: Filter by category ID
        in: query
        name: category_id
        type: string
      - description: Filter by tag slug
        in: query
        name: tag
        type: string
      - description: Search keyword
        in: query
        name: search
        type: string
      - default: newest
        description: Sort order
        enum:
        - newest
        - oldest
        - most_viewed
        - most_liked
        in: query
        name: sort
        type: string
      - description: Filter by author ID
        in: query
        name: author_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.APIResponse'
            - properties:
                data:
                  type: object
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.APIResponse'
      security:
      - BearerAuth: []
      summary: List articles
      tags:
      - Articles
    post:
      consumes:
      - application/json
      description: Create a new article (requires articles.create permission)
      parameters:
      - description: Article data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/services.CreateArticleRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/handlers.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Article'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.APIResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.APIResponse'
      security:
      - BearerAuth: []
      summary: Create article
      tags:
      - Articles
  /articles/{id}:
    delete:
      description: Soft-delete an article (requires articles.delete permission)
      parameters:
      - description: Article ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.APIResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.APIResponse'
      security:
      - BearerAuth: []
      summary: Delete article
      tags:
      - Articles
    get:
      description: Returns a single article by its ID
      parameters:
      - description: Article ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Article'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.APIResponse'
      security:
      - BearerAuth: []
      summary: Get article by ID
      tags:
      - Articles
    put:
      consumes:
      - application/json
      description: Update an existing article (requires articles.edit permission)
      parameters:
      - description: Article ID
        in: path
        name: id
